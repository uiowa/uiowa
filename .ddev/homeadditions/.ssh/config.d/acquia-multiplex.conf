# SSH connection multiplexing for Acquia Cloud.
#
# Reuses one authenticated TCP connection per app server, so parallel drush
# calls (e.g. sn multisite:execute) skip the per-call SSH handshake and
# avoid tripping sshd connection-rate limits (MaxStartups).
#
# Note: sshd caps concurrent sessions per multiplexed connection
# (MaxSessions, commonly 10). Pool concurrency much higher than that
# against a single app may fail mux session requests.
Host *.ssh.prod.acquia-sites.com
  ControlMaster auto
  ControlPath ~/.ssh/cm-%C
  ControlPersist 600
