# SiteNow application registry.
#
# The canonical list of Acquia Cloud applications that are valid SiteNow
# multisite targets. Each entry carries the application UUID (used by the
# Acquia Cloud API, e.g. deploy:activate) and the git remote the build
# artifact is pushed to (deploy:distribute). Adding an application here is the
# deliberate step that makes it available to sitenow:multisite:create.
#
# reserved: true  excludes an application from automatic selection (it can
# still be chosen explicitly with --app). uiowa06 is reserved for Healthcare.
# The deploy commands still fan out to reserved applications.
#
# Not secret: UUIDs and git remotes only (the remotes are also in blt.yml).
# Acquia API credentials live elsewhere, never here.

